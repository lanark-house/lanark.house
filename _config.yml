---
title: lanark.house
description: |
  This repository and site serve as a way to document and
  inventory every step of my new home purchase process.
url: "https://lanark.house"
baseurl: ""

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Theme
remote_theme: daviddarnes/garth

# Exclusions
exclude:
  - _uploads
  - vendor
  - .bundle
  - .jekyll-cache
  - .jekyll-metadata
  - bin
  - node_modules
  - Gemfile
  - Gemfile.lock
  - sitemap.txt
  - GEMINI.md
  - CNAME
