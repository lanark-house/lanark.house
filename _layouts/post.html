layout: page

  <h1 class="font-display text-4xl font-bold text-primary mb-2">{{ page.title }}</h1>
  <time class="text-sm text-primary/50 uppercase tracking-widest">{{ page.date | date: "%B %d, %Y" }}</time>
</div>

{{ content }}

<div class="mt-12 pt-8 border-t border-primary/10">
  <a href="{{ '/' | relative_url }}" class="text-primary font-bold flex items-center gap-2 hover:underline">
    <span class="material-symbols-outlined text-sm">arrow_back</span>
    Back to Home
  </a>
</div>
